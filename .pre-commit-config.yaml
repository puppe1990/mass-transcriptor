repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: backend/.venv/bin/ruff check --fix
        language: system
        files: ^backend/.*\.py$
      - id: ruff-format
        name: ruff format
        entry: backend/.venv/bin/ruff format
        language: system
        files: ^backend/.*\.py$
