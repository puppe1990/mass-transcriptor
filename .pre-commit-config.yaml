repos:
  - repo: local
    hooks:
      - id: backend-ruff-check
        name: backend ruff check
        entry: bash -c 'cd backend && (test -x .venv/bin/ruff && .venv/bin/ruff check --fix . || python -m ruff check --fix .)'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: backend-ruff-format
        name: backend ruff format
        entry: bash -c 'cd backend && (test -x .venv/bin/ruff && .venv/bin/ruff format . || python -m ruff format .)'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      - id: backend-pytest
        name: backend pytest
        entry: bash -c 'rm -rf backend/tests/.runtime && mkdir -p backend/tests/.runtime && cd backend && (test -x .venv/bin/pytest && .venv/bin/pytest -q || python -m pytest -q)'
        language: system
        files: ^backend/
        pass_filenames: false

      - id: frontend-eslint
        name: frontend eslint
        entry: bash -c 'npx --prefix frontend eslint --fix "$@"' --
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$

      - id: frontend-prettier
        name: frontend prettier
        entry: bash -c 'npx --prefix frontend prettier --write "$@"' --
        language: system
        files: ^frontend/.*\.(ts|tsx|css|html|json)$

      - id: frontend-vitest
        name: frontend vitest
        entry: bash -c 'cd frontend && npm run test'
        language: system
        files: ^frontend/
        pass_filenames: false
